apiVersion: argoproj.io/v1alpha1 
kind: Application
metadata:
  name: ecommerce-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ayush-Harsh-devops/devops-realtime-projects 
    targetRevision: main
    path: 03-k8s-ecommerce/k8s/helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ecommerce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
